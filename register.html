<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ARC101</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-header">
      <img
        src="assets/img/logo.png"
        alt="ARC101 logo"
        class="auth-logo-img"
        onerror="this.outerHTML='<div style=\'font-size:2.5rem;margin-bottom:.5rem;\'>🏗️</div>'"
      >
      <h2>Create Account</h2>
      <p style="opacity:.8;font-size:.88rem;margin:0;">Join ARC101 to manage your projects</p>
    </div>
    <div class="auth-card-body">
      <div id="errorMsg"   class="alert alert-danger"  style="display:none;"></div>
      <div id="successMsg" class="alert alert-success" style="display:none;"></div>
      <div class="form-group">
        <label class="form-label">Full Name <span class="required">*</span></label>
        <input type="text" id="name" class="form-control" placeholder="Juan dela Cruz">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address <span class="required">*</span></label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" id="phone" class="form-control" placeholder="09XX XXX XXXX">
      </div>
      <div class="form-group">
        <label class="form-label">Password <span class="required">*</span></label>
        <input type="password" id="password" class="form-control" placeholder="Min 8 characters">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password <span class="required">*</span></label>
        <input type="password" id="confirm" class="form-control" placeholder="Re-enter password">
      </div>
      <button class="btn btn-primary btn-block btn-lg" id="regBtn" onclick="doRegister()">Create Account</button>
      <div style="text-align:center;margin-top:1.25rem;font-size:.88rem;">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="assets/js/utils.js"></script>
<script src="assets/js/register.js"></script>
</body>
</html>
